{% extends "core/base.html" %}
{% block title %}Schedule Appointment — YouthCare{% endblock %}
{% block content %}
<a href="{% url 'student_detail' student.id %}" class="back-link">&larr; Back to Student</a>

<div class="card" style="max-width:560px;">
    <h2 class="card-title">Schedule Appointment</h2>
    <p class="card-subtitle">Student: <strong>{{ student.first_name }} {{ student.last_name }}</strong></p>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Date</label>
            {{ form.date }}
        </div>
        <div class="form-group">
            <label class="form-check">
                {{ form.attended }} <span>Attended</span>
            </label>
        </div>
        <div class="form-group">
            <label class="form-label">Notes</label>
            {{ form.notes }}
        </div>
        <button type="submit" class="btn">Save Appointment</button>
        <a href="{% url 'student_detail' student.id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
