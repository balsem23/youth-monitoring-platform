<!DOCTYPE html>
<html>
<head>
    <title>Login — YouthCare</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
    <style>
        body { display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; background:#f0f4f8; }
        .login-wrap { width:400px; }
        .login-card { background:#fff; padding:40px; border-radius:20px; box-shadow:0 10px 40px rgba(15,23,42,0.08); border:1px solid #e2e8f0; }
        .login-card h1 { font-size:28px; font-weight:800; margin:0 0 4px; color:#0f172a; }
        .login-card .sub { color:#64748b; font-size:13px; margin:0 0 24px; }
        .login-card p:has(input) { margin-bottom:16px; }
        .login-card label { display:block; font-weight:600; font-size:14px; margin-bottom:4px; color:#334155; }
        .login-card input { width:100%; max-width:100%; }
        .login-card .btn { width:100%; justify-content:center; padding:12px; font-size:15px; }
        .login-hint { font-size:12px; color:#94a3b8; text-align:center; margin-top:20px; line-height:1.6; }
        .login-hint strong { color:#64748b; }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-card">
        <h1>YouthCare</h1>
        <p class="sub">Decision-support platform — not clinical/legal authority</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Login</button>
        </form>
        <div class="login-hint">
            <strong>admin_user</strong> / Test1234!<br>
            <strong>teacher_user</strong> / Test1234!<br>
            <strong>counselor_user</strong> / Test1234!
        </div>
    </div>
</div>
</body>
</html>
